<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>ビデオ背景 - Comp Systems</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 100vw;
      height: 100vh;
      background: #fff url('wave.png') center / cover no-repeat;
      font-family: 'Inter', sans-serif;
      overflow: hidden;
      position: relative;
    }

    .layout {
      position: relative;
      z-index: 1;
      width: 100%;
      height: 100%;
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
    }

    /* 左1/3：会社名・名前 */
    .col-left {
      padding: 7vh 5vw;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      gap: 4vh;
    }

    .company {
      font-size: 5.5vh;
      font-weight: 600;
      color: #000;
      letter-spacing: 0;
      white-space: nowrap;
    }

    .tagline {
      font-size: 2.2vh;
      font-weight: 300;
      color: #000;
      letter-spacing: 0.06em;
      margin-top: 1vh;
      white-space: nowrap;
    }

    .name-block {
      display: flex;
      flex-direction: column;
      gap: 1vh;
    }

    .title {
      font-size: 2.5vh;
      font-weight: 400;
      color: #000;
      letter-spacing: 0.1em;
    }

    .name-ja {
      font-size: 7vh;
      font-weight: 500;
      color: #000;
      letter-spacing: 0.06em;
      white-space: nowrap;
    }

    .name-en {
      font-size: 3vh;
      font-weight: 300;
      color: #000;
      letter-spacing: 0.05em;
      white-space: nowrap;
    }

    /* 中央1/3：空白 */
    .col-center {
      /* 何も置かない */
    }

    /* 右1/3：QRコード */
    .col-right {
      padding: 7vh 5vw;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      justify-content: flex-end;
    }

    .qr-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5vh;
    }

    .qr-url {
      font-size: 2vh;
      font-weight: 300;
      color: #000;
      letter-spacing: 0.03em;
      text-align: center;
      white-space: nowrap;
    }

    #qrcode canvas,
    #qrcode img {
      width: 12vh !important;
      height: 12vh !important;
      border-radius: 3px;
    }
  </style>
</head>
<body>
  <div class="layout">
    <div class="col-left">
      <div>
        <p class="company">Comp Systems</p>
        <p class="tagline">AI活用支援コンサルティング</p>
      </div>
      <div class="name-block">
        <p class="title">代表</p>
        <p class="name-ja">尾﨑 将也</p>
        <p class="name-en">Masaya Ozaki</p>
      </div>
    </div>

    <div class="col-center"></div>

    <div class="col-right">
      <div class="qr-wrap">
        <div id="qrcode"></div>
        <p class="qr-url">comp-systems-web.vercel.app</p>
      </div>
    </div>
  </div>

  <script>
    const size = Math.round(window.innerHeight * 0.12)
    new QRCode(document.getElementById("qrcode"), {
      text: "https://comp-systems-web.vercel.app",
      width: size,
      height: size,
      colorDark: "#000000",
      colorLight: "#ffffff",
    });
  </script>
</body>
</html>
