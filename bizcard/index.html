<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>名刺デザイン - Comp Systems</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #111;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Inter', sans-serif;
    }

    .label {
      color: #555;
      font-size: 11px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-bottom: 24px;
    }

    .card {
      width: 432px;
      height: 261px;
      background: #000;
      position: relative;
      overflow: hidden;
      border-radius: 6px;
    }

    .card::before {
      content: '';
      position: absolute;
      inset: -5%;
      background: url('wave-dark.png') center / cover no-repeat;
      z-index: 0;
    }

    .card-front {
      padding: 28px 36px;
      height: 100%;
      position: relative;
      z-index: 1;
      display: flex;
      justify-content: space-between;
    }

    /* 左カラム：テキスト */
    .left {
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .top { display: flex; flex-direction: column; gap: 4px; }

    .company {
      font-size: 21px;
      font-weight: 600;
      color: #fff;
      letter-spacing: 0.04em;
    }

    .tagline {
      font-size: 11px;
      font-weight: 300;
      color: #ffffff;
      letter-spacing: 0.06em;
    }

    .middle {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .title {
      font-size: 13px;
      font-weight: 400;
      color: #ffffff;
      letter-spacing: 0.1em;
    }

    .name-row {
      display: flex;
      align-items: baseline;
      gap: 12px;
    }

    .name-ja {
      font-size: 33px;
      font-weight: 500;
      color: #fff;
      letter-spacing: 0.06em;
    }

    .name-en {
      font-size: 22px;
      font-weight: 300;
      color: #ffffff;
      letter-spacing: normal;
      margin-top: -4px;
    }

    .contact {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .contact-line {
      font-size: 13.5px;
      font-weight: 300;
      color: #ffffff;
      letter-spacing: 0.03em;
    }

    /* 右カラム：QRコード */
    .right {
      display: flex;
      align-items: flex-end;
      margin-bottom: -8px;
      margin-right: -10px;
    }

    .qr-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    .qr-url {
      font-size: 12.6px;
      font-weight: 300;
      color: #ffffff;
      letter-spacing: 0.03em;
      text-align: center;
    }

    #qrcode canvas,
    #qrcode img {
      width: 56px !important;
      height: 56px !important;
      border-radius: 3px;
    }
  </style>
</head>
<body>
  <p class="label">表面</p>
  <div class="card">
    <div class="card-front">
      <div class="left">
        <div class="top">
          <p class="company">Comp Systems</p>
          <p class="tagline">AI活用支援コンサルティング</p>
        </div>
        <div class="middle">
          <p class="title">代表</p>
          <p class="name-ja">尾﨑 将也</p>
          <p class="name-en">Masaya Ozaki</p>
        </div>
        <div class="contact">
          <p class="contact-line">080-6391-8299</p>
          <p class="contact-line">masaya980819@gmail.com</p>
        </div>
      </div>
      <div class="right">
        <div class="qr-wrap">
          <div id="qrcode"></div>
          <p class="qr-url">comp-systems-web.<br>vercel.app</p>
        </div>
      </div>
    </div>
  </div>

  <script>
    new QRCode(document.getElementById("qrcode"), {
      text: "https://comp-systems-web.vercel.app",
      width: 56,
      height: 56,
      colorDark: "#ffffff",
      colorLight: "#000000",
    });
  </script>
</body>
</html>
